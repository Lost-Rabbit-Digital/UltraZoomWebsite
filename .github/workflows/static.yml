# Validate, build, and deploy the Ultra Zoom static site to GitHub Pages.
#
# Pipeline:
#   validate   → catch HTML errors and broken links early
#   build      → minify HTML/CSS, optimize images, produce clean _site/ output
#   lighthouse → run Lighthouse audit and post a performance summary
#   deploy     → push _site/ to GitHub Pages (main branch only)

name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # ── Validate ────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate HTML
        run: npx --yes html-validate *.html

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir . '*.html'
          fail: true

  # ── Build & Optimize ────────────────────────────────────
  build:
    name: Build
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install build tools
        run: npm install --no-save clean-css-cli html-minifier-terser

      - name: Create output directory
        run: mkdir -p _site/images

      - name: Minify CSS
        run: npx cleancss -o _site/styles.css styles.css

      - name: Minify HTML
        run: |
          for file in *.html; do
            npx html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --remove-redundant-attributes \
              --remove-script-type-attributes \
              --remove-style-link-type-attributes \
              --minify-css true \
              --minify-urls true \
              --output "_site/$file" \
              "$file"
          done

      - name: Optimize images
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq optipng > /dev/null 2>&1
          cp images/* _site/images/
          optipng -quiet -o2 _site/images/*.png

      - name: Report build sizes
        run: |
          echo "### Build output" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in _site/*.html _site/*.css _site/images/*; do
            size=$(du -h "$f" | cut -f1)
            name=${f#_site/}
            echo "| \`$name\` | $size |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total:** $(du -sh _site | cut -f1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── Lighthouse ───────────────────────────────────────────
  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: _artifact

      - name: Extract artifact
        run: mkdir -p _site && tar -xf _artifact/artifact.tar -C _site

      - name: Lighthouse audit
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .github/lighthouse/lighthouserc.json

      - name: Format Lighthouse summary
        uses: actions/github-script@v7
        env:
          LIGHTHOUSE_MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
          LIGHTHOUSE_LINKS: ${{ steps.lighthouse.outputs.links }}
        with:
          script: |
            const manifestRaw = process.env.LIGHTHOUSE_MANIFEST;
            const linksRaw   = process.env.LIGHTHOUSE_LINKS;

            if (!manifestRaw) {
              core.warning('No Lighthouse results available — skipping summary.');
              return;
            }

            const results = JSON.parse(manifestRaw);
            const links   = linksRaw ? JSON.parse(linksRaw) : {};

            const score = (v) => Math.round(v * 100);
            const emoji = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴';

            let body = '### ⚡ Lighthouse Report\n\n';
            body += '| Category | Score |\n|----------|-------|\n';

            for (const result of results) {
              const { summary } = result;
              for (const [key, value] of Object.entries(summary)) {
                const label = key.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                body += `| ${emoji(value)} ${label} | ${score(value)} |\n`;
              }
            }

            if (Object.keys(links).length) {
              body += '\n**Full reports:** ';
              body += Object.entries(links).map(([url, link]) => `[${new URL(url).pathname || '/'}](${link})`).join(' · ');
              body += '\n';
            }

            core.summary.addRaw(body).write();

  # ── Deploy ──────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
