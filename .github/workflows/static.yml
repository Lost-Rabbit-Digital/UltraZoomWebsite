# Validate, build, and deploy the Ultra Zoom static site to Cloudflare Workers.
#
# Pipeline:
#   build      → install deps, run `astro build`, upload dist/ artifact
#   validate   → html-validate + lychee against the built dist/
#   lighthouse → Lighthouse audit over the built dist/
#   deploy     → `wrangler versions upload` on main (serves dist/ per wrangler.jsonc)
#
# Third-party actions are pinned to commit SHAs for supply-chain safety.
# actions/* are trusted at major-version tags.

name: Deploy static content to Workers

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "workers-${{ github.ref }}"
  # Cancel superseded PR runs; never cancel an in-flight main-branch deploy.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "24"

jobs:
  # ── Build ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Report build size
        run: |
          echo "### Build output" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total size | $(du -sh dist | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HTML pages | $(find dist -name '*.html' | wc -l) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Assets     | $(find dist -type f ! -name '*.html' | wc -l) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: site-build
          path: dist
          retention-days: ${{ github.event_name == 'pull_request' && 7 || 14 }}

  # ── Validate ────────────────────────────────────────────
  validate:
    name: Validate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: site-build
          path: dist

      - name: Validate HTML
        run: npx --yes html-validate 'dist/**/*.html'

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --cache --max-cache-age 1d --offline --no-progress --fallback-extensions html --root-dir "$GITHUB_WORKSPACE/dist" 'dist/**/*.html'
          fail: true

  # ── Lighthouse ──────────────────────────────────────────
  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: site-build
          path: dist

      - name: Lighthouse audit
        id: lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          uploadArtifacts: true
          configPath: .github/lighthouse/lighthouserc.json

      - name: Format Lighthouse summary
        uses: actions/github-script@v8
        env:
          LIGHTHOUSE_MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
          LIGHTHOUSE_LINKS: ${{ steps.lighthouse.outputs.links }}
        with:
          script: |
            const fs = require('fs');

            const manifestRaw = (process.env.LIGHTHOUSE_MANIFEST || '').trim();
            const linksRaw   = (process.env.LIGHTHOUSE_LINKS   || '').trim();

            if (!manifestRaw) {
              core.warning('No Lighthouse results available — skipping summary.');
              return;
            }

            const results = JSON.parse(manifestRaw);
            const links   = linksRaw ? JSON.parse(linksRaw) : {};

            const CATEGORIES = [
              { id: 'performance',    label: 'Perf' },
              { id: 'accessibility',  label: 'A11y' },
              { id: 'best-practices', label: 'BP'   },
              { id: 'seo',            label: 'SEO'  },
            ];
            const SKIP_DISPLAY_MODES = new Set(['informative', 'notApplicable', 'manual']);

            const score = (v) => Math.round(v * 100);
            const emoji = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴';
            const pathOf = (urlStr) => {
              const p = new URL(urlStr).pathname.replace(/\.html$/, '');
              return p === '/index' ? '/' : (p || '/');
            };

            let body = '### ⚡ Lighthouse Report\n\n';
            body += '| Page | ' + CATEGORIES.map(c => c.label).join(' | ') + ' |\n';
            body += '|------|' + CATEGORIES.map(() => ':----:').join('|') + '|\n';

            const perPageIssues = [];

            for (const result of results) {
              const p = pathOf(result.url);
              const row = [`\`${p}\``];
              for (const { id } of CATEGORIES) {
                const s = result.summary[id];
                row.push(s == null ? '—' : `${emoji(s)} ${score(s)}`);
              }
              body += '| ' + row.join(' | ') + ' |\n';

              try {
                const report = JSON.parse(fs.readFileSync(result.jsonPath, 'utf-8'));
                const issues = [];
                for (const { id: catId, label } of CATEGORIES) {
                  const category = report.categories[catId];
                  if (!category) continue;
                  for (const ref of category.auditRefs) {
                    const audit = report.audits[ref.id];
                    if (!audit) continue;
                    if (SKIP_DISPLAY_MODES.has(audit.scoreDisplayMode)) continue;
                    if (audit.score === null || audit.score >= 1) continue;
                    issues.push({
                      category: label,
                      title: audit.title,
                      score: audit.score,
                      weight: ref.weight || 0,
                    });
                  }
                }
                if (issues.length) {
                  issues.sort((a, b) => a.score - b.score || b.weight - a.weight);
                  const worst = Math.min(...issues.map(i => i.score));
                  perPageIssues.push({ path: p, issues, worst });
                }
              } catch (e) {
                core.warning(`Could not read report ${result.jsonPath}: ${e.message}`);
              }
            }

            if (perPageIssues.length) {
              perPageIssues.sort((a, b) => a.worst - b.worst);
              body += '\n<details open>\n<summary><strong>Top issues per page</strong></summary>\n\n';
              for (const { path: p, issues } of perPageIssues) {
                body += `**\`${p}\`**\n`;
                for (const iss of issues.slice(0, 5)) {
                  body += `- ${iss.category}: ${iss.title} (${score(iss.score)})\n`;
                }
                body += '\n';
              }
              body += '</details>\n';
            } else {
              body += '\n_No failing audits across any audited page._ 🎉\n';
            }

            if (Object.keys(links).length) {
              body += '\n**Full reports:** ';
              body += Object.entries(links).map(([url, link]) => `[${pathOf(url)}](${link})`).join(' · ');
              body += '\n';
            }

            core.summary.addRaw(body).write();

  # ── Deploy to Cloudflare Workers ────────────────────────
  deploy:
    name: Deploy
    needs: [validate, lighthouse]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ultrazoom.app
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: site-build
          path: dist

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: versions upload
