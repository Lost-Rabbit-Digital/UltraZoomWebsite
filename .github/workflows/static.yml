# Validate, build, and deploy the Ultra Zoom static site to Cloudflare Workers.
#
# Pipeline:
#   build      → install deps, run `astro build`, upload dist/ artifact
#   validate   → html-validate + lychee against the built dist/
#   lighthouse → Lighthouse audit over the built dist/
#   deploy     → `wrangler versions upload` on main (serves dist/ per wrangler.jsonc)

name: Deploy static content to Workers

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "workers-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # ── Build ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Report build size
        run: |
          echo "### Build output" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total:** $(du -sh dist | cut -f1)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: dist

  # ── Validate ────────────────────────────────────────────
  validate:
    name: Validate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: dist

      - name: Validate HTML
        run: npx --yes html-validate 'dist/**/*.html'

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir "$GITHUB_WORKSPACE/dist" 'dist/**/*.html'
          fail: true

  # ── Lighthouse ──────────────────────────────────────────
  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: dist

      - name: Lighthouse audit
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .github/lighthouse/lighthouserc.json

      - name: Format Lighthouse summary
        uses: actions/github-script@v7
        env:
          LIGHTHOUSE_MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
          LIGHTHOUSE_LINKS: ${{ steps.lighthouse.outputs.links }}
        with:
          script: |
            const manifestRaw = (process.env.LIGHTHOUSE_MANIFEST || '').trim();
            const linksRaw   = (process.env.LIGHTHOUSE_LINKS   || '').trim();

            if (!manifestRaw) {
              core.warning('No Lighthouse results available — skipping summary.');
              return;
            }

            const results = JSON.parse(manifestRaw);
            const links   = linksRaw ? JSON.parse(linksRaw) : {};

            const score = (v) => Math.round(v * 100);
            const emoji = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴';

            let body = '### ⚡ Lighthouse Report\n\n';
            body += '| Category | Score |\n|----------|-------|\n';

            for (const result of results) {
              const { summary } = result;
              for (const [key, value] of Object.entries(summary)) {
                const label = key.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                body += `| ${emoji(value)} ${label} | ${score(value)} |\n`;
              }
            }

            if (Object.keys(links).length) {
              body += '\n**Full reports:** ';
              body += Object.entries(links).map(([url, link]) => `[${new URL(url).pathname || '/'}](${link})`).join(' · ');
              body += '\n';
            }

            core.summary.addRaw(body).write();

  # ── Deploy to Cloudflare Workers ────────────────────────
  deploy:
    name: Deploy
    needs: [validate, lighthouse]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ultrazoom.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: dist

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload
