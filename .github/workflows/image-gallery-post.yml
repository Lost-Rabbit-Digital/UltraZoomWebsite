name: Image gallery posting

# Stage 4 of the image-gallery pipeline.  Runs every 2 hours; on each tick
# claims at most one queue row whose scheduled_at <= now and posts it to
# Imgur (upload + gallery submit).  If the enhanced JPEG is missing on the
# runner (e.g. cache evicted) we re-fetch the source URL from the candidate
# row and re-run enhance.py for that single candidate.
#
# The committed `outreach/image-gallery/gallery.db` is the source of truth
# for the queue.  Approve items locally, push, and the next cron tick will
# pick them up.
#
# Required GitHub Secrets:
#   IMGUR_CLIENT_ID, IMGUR_CLIENT_SECRET, IMGUR_REFRESH_TOKEN

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Plan a post without uploading'
        required: false
        type: boolean
        default: false
      verbose:
        description: 'Verbose logging'
        required: false
        type: boolean
        default: true
  schedule:
    # Every 2 hours, on the hour. Cron is in UTC; the queue's scheduled_at
    # is also UTC, so the only effect of the time of day is whether any
    # row is actually due. Most ticks will be no-ops.
    - cron: '0 */2 * * *'

permissions:
  contents: write

concurrency:
  group: image-gallery-state
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: outreach/image-gallery/requirements.txt

      - name: Install dependencies
        run: pip install -r outreach/image-gallery/requirements.txt

      - name: Restore enhanced files cache
        uses: actions/cache@v4
        with:
          path: |
            outreach/image-gallery/enhanced
            outreach/image-gallery/candidates
            outreach/image-gallery/models
          key: image-gallery-files-${{ github.run_id }}
          restore-keys: |
            image-gallery-files-

      - name: Sanity-check secrets
        env:
          IMGUR_CLIENT_ID:     ${{ secrets.IMGUR_CLIENT_ID }}
          IMGUR_CLIENT_SECRET: ${{ secrets.IMGUR_CLIENT_SECRET }}
          IMGUR_REFRESH_TOKEN: ${{ secrets.IMGUR_REFRESH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "${DRY_RUN:-false}" = "true" ]; then
            echo "Dry run: secrets not required."
            exit 0
          fi
          missing=()
          [ -z "${IMGUR_CLIENT_ID:-}" ]     && missing+=("IMGUR_CLIENT_ID")
          [ -z "${IMGUR_CLIENT_SECRET:-}" ] && missing+=("IMGUR_CLIENT_SECRET")
          [ -z "${IMGUR_REFRESH_TOKEN:-}" ] && missing+=("IMGUR_REFRESH_TOKEN")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Drain queue
        env:
          IMGUR_CLIENT_ID:     ${{ secrets.IMGUR_CLIENT_ID }}
          IMGUR_CLIENT_SECRET: ${{ secrets.IMGUR_CLIENT_SECRET }}
          IMGUR_REFRESH_TOKEN: ${{ secrets.IMGUR_REFRESH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
          VERBOSE: ${{ inputs.verbose || 'true' }}
        working-directory: outreach/image-gallery
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${DRY_RUN:-false}" = "true" ]; then ARGS+=("--dry-run"); fi
          if [ "${VERBOSE:-true}" = "true" ]; then ARGS+=("--verbose"); fi
          python post.py "${ARGS[@]}"

      - name: Commit gallery.db back
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          if git diff --quiet -- outreach/image-gallery/gallery.db; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "ultrazoom-bot[ci]"
          git config user.email "bot@lostrabbitdigital.com"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add outreach/image-gallery/gallery.db
          git commit -m "image-gallery: posted to Imgur (run ${{ github.run_id }})"
          git push origin HEAD:"${GITHUB_REF_NAME}"
