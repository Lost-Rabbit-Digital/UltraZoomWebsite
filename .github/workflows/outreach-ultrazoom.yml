name: Ultra Zoom outreach

# Cold-email pipeline for the Ultra Zoom Realtors campaign. Triggered by:
#
#   workflow_dispatch  Operator runs ad-hoc (good for dry-run testing on
#                      feature branches).
#   push to main       Triggers automatically when a new Apollo CSV lands
#                      under outreach/inbox/ultrazoom-realtors/.
#
# The pipeline reads the newest *.csv in
# outreach/inbox/ultrazoom-realtors/, asks Claude to draft a personalized
# Touch 1 + Touch 2 per row, and appends the results to two tabs
# (UZ_Realtors_T1, UZ_Realtors_T2) of the campaign's Google Sheet that
# MailMeteor imports independently. See outreach/README.md.
#
# (UZ Press cold email was retired in favor of $75-tier press releases;
# see docs/press/ultrazoom-launch-press-release.md.)
#
# Required GitHub Secrets:
#   ANTHROPIC_API_KEY               Claude API key for personalization.
# Required GitHub Variables:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  WIF provider resource name.
#   GCP_SERVICE_ACCOUNT             leads-writer service-principal email.
#   GOOGLE_SHEET_ID_UZ_REALTORS     Sheet for the Realtors campaign.
#
# The Sheet must already exist with tabs UZ_Realtors_T1 and
# UZ_Realtors_T2 and be shared (Editor) with the SP email above.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Anthropic model'
        required: false
        type: choice
        options:
          - haiku
          - sonnet
          - opus
        default: haiku
      limit:
        description: 'Cap leads processed (0 = no cap)'
        required: false
        default: '0'
      dry_run:
        description: 'Dry run (no external writes, no API spend)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'outreach/inbox/ultrazoom-realtors/**'

permissions:
  contents: read
  id-token: write  # for Workload Identity Federation

concurrency:
  group: outreach-ultrazoom-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r outreach/requirements.txt

      - name: Sanity-check secrets and variables
        if: ${{ inputs.dry_run != true }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID_UZ_REALTORS: ${{ vars.GOOGLE_SHEET_ID_UZ_REALTORS }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${ANTHROPIC_API_KEY:-}" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -z "${GCP_SERVICE_ACCOUNT:-}" ] && missing+=("GCP_SERVICE_ACCOUNT")
          [ -z "${GOOGLE_SHEET_ID_UZ_REALTORS:-}" ] && missing+=("GOOGLE_SHEET_ID_UZ_REALTORS")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ inputs.dry_run != true }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Run Ultra Zoom Realtors outreach
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID_UZ_REALTORS: ${{ vars.GOOGLE_SHEET_ID_UZ_REALTORS }}
          MODEL: ${{ inputs.model || 'haiku' }}
          LIMIT: ${{ inputs.limit || '0' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          ARGS=(--campaign realtors --model "$MODEL" --limit "$LIMIT")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python -m outreach.run_ultrazoom "${ARGS[@]}"
