name: Sync Wiza prospect lists

# Pulls already-finished Wiza prospect lists into the MailMeteor source
# Sheet via the API. Re-fetching a finished list is free (the credit
# was spent at enrichment time), so this is the right tool whenever
# Wiza emailed CSVs instead of returning contacts on the API workflow
# run, or whenever you want to backfill a list that was created in the
# Wiza UI.
#
# Inputs (use one):
#   list_ids   — comma- or newline-separated Wiza list IDs (the trailing
#                number in WIZA_*_ID{N}.csv filenames). e.g.
#                "4964965,4964953,4964954" or one per line.
#   auto       — enumerate every finished list on the account via
#                GET /lists. Useful for a one-shot backfill.
#
# Required GitHub Secrets:
#   WIZA_API_KEY
#   ANTHROPIC_API_KEY              (optional; only if personalize=true)
# Required GitHub Variables:
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_SERVICE_ACCOUNT
#   GOOGLE_SHEET_ID

on:
  workflow_dispatch:
    inputs:
      list_ids:
        description: 'Wiza list IDs (comma- or newline-separated). Leave blank with auto=true to backfill everything.'
        required: false
        type: string
      auto:
        description: 'Enumerate finished lists from the Wiza account (GET /lists)'
        required: false
        type: boolean
        default: false
      tab:
        description: 'Force destination tab (default: route by list name)'
        required: false
        type: choice
        options:
          - auto
          - UltraZoom
          - HailBytes
        default: auto
      segment:
        description: 'Which Wiza segment to pull'
        required: false
        type: choice
        options:
          - valid
          - risky
          - people
        default: valid
      personalize:
        description: 'Generate Claude openers per row'
        required: false
        type: boolean
        default: true
      model:
        description: 'Anthropic model for the opener'
        required: false
        type: choice
        options:
          - haiku
          - sonnet
          - opus
        default: haiku
      max_lists:
        description: 'Cap the number of lists processed this run (blank = no cap)'
        required: false
        default: ''
      dry_run:
        description: 'Log only — no Sheet writes, no Anthropic calls'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: sync-wiza-lists
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r outreach/requirements.txt

      - name: Sanity-check secrets and variables
        if: ${{ inputs.dry_run != true }}
        env:
          WIZA_API_KEY: ${{ secrets.WIZA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${WIZA_API_KEY:-}" ] && missing+=("WIZA_API_KEY")
          [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -z "${GCP_SERVICE_ACCOUNT:-}" ] && missing+=("GCP_SERVICE_ACCOUNT")
          [ -z "${GOOGLE_SHEET_ID:-}" ] && missing+=("GOOGLE_SHEET_ID")
          if [ "${{ inputs.personalize }}" = "true" ] && [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            missing+=("ANTHROPIC_API_KEY (personalize=true)")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ inputs.dry_run != true }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Run Wiza list sync
        env:
          WIZA_API_KEY: ${{ secrets.WIZA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
          LIST_IDS: ${{ inputs.list_ids }}
        run: |
          set -euo pipefail
          # Split list_ids on commas or newlines.
          IDS=()
          if [ -n "${LIST_IDS:-}" ]; then
            mapfile -t IDS < <(echo "$LIST_IDS" | tr ',' '\n' | grep -E '^[[:space:]]*[0-9]+[[:space:]]*$' | tr -d '[:space:]')
          fi
          echo "received ${#IDS[@]} explicit list IDs"

          ARGS=()
          if [ ${#IDS[@]} -gt 0 ]; then
            ARGS+=("${IDS[@]}")
          fi
          if [ "${{ inputs.auto }}" = "true" ]; then
            ARGS+=(--auto)
          fi
          if [ ${#IDS[@]} -eq 0 ] && [ "${{ inputs.auto }}" != "true" ]; then
            echo "::error::provide list_ids or set auto=true"
            exit 1
          fi
          if [ "${{ inputs.tab }}" != "auto" ] && [ -n "${{ inputs.tab }}" ]; then
            ARGS+=(--tab "${{ inputs.tab }}")
          fi
          ARGS+=(--segment "${{ inputs.segment || 'valid' }}")
          if [ "${{ inputs.personalize }}" = "true" ]; then
            ARGS+=(--personalize)
          else
            ARGS+=(--no-personalize)
          fi
          ARGS+=(--model "${{ inputs.model || 'haiku' }}")
          if [ -n "${{ inputs.max_lists }}" ]; then
            ARGS+=(--max-lists "${{ inputs.max_lists }}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          python -m outreach.sync_wiza_lists "${ARGS[@]}"
