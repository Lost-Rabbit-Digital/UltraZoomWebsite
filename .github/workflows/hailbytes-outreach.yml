name: HailBytes outreach

# Daily MSSP / pen-test / consulting cold-email lane for HailBytes SAT
# and ASM. Runs at 8:00 AM MDT (14:00 UTC) every morning, staggered with
# the Ultra Zoom power-user lane (14:06 UTC) so MailMeteor reads
# don't collide.
#
# Required GitHub Secrets:
#   BRAVE_SEARCH_KEY               (Brave Web Search API; mapped to
#                                   BRAVE_SEARCH_API_KEY for the pipeline)
#   HUNTER_API_KEY                 (decision-maker domain search)
#   ANTHROPIC_API_KEY              (Claude personalized opener)
#   NEVERBOUNCE_API_KEY            (optional — overrides Hunter verify)
#   ZEROBOUNCE_API_KEY             (optional — overrides Hunter verify)
# Required GitHub Variables:
#   GCP_WORKLOAD_IDENTITY_PROVIDER (shared with other outreach lanes)
#   GCP_SERVICE_ACCOUNT
#   GOOGLE_SHEET_ID                (the MailMeteor source sheet)
#
# Sheet expectation: a tab named "HailBytes" must exist with headers
# matching outreach.config.SHEET_COLUMNS. Pipeline appends only — never
# overwrites — and dedupes per-email against existing rows in that tab.
#
# Brave Search API reference:
#   https://api-dashboard.search.brave.com/app/documentation/web-search

on:
  schedule:
    - cron: '0 14 * * *'  # 8:00 AM MDT daily
  workflow_dispatch:
    inputs:
      max_stage:
        description: 'Max enriched rows to stage'
        required: false
        default: '25'
      product:
        description: 'Which HailBytes product the opener anchors (sat | asm | rotate)'
        required: false
        default: 'rotate'
      dry_run:
        description: 'Dry run (no API calls, no Sheet writes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: hailbytes-outreach
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r outreach/requirements.txt

      - name: Sanity-check secrets and variables
        if: ${{ inputs.dry_run != true }}
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${BRAVE_SEARCH_API_KEY:-}" ] && missing+=("BRAVE_SEARCH_KEY")
          [ -z "${HUNTER_API_KEY:-}" ] && missing+=("HUNTER_API_KEY")
          [ -z "${ANTHROPIC_API_KEY:-}" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -z "${GCP_SERVICE_ACCOUNT:-}" ] && missing+=("GCP_SERVICE_ACCOUNT")
          [ -z "${GOOGLE_SHEET_ID:-}" ] && missing+=("GOOGLE_SHEET_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ inputs.dry_run != true }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Run HailBytes pipeline
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          NEVERBOUNCE_API_KEY: ${{ secrets.NEVERBOUNCE_API_KEY }}
          ZEROBOUNCE_API_KEY: ${{ secrets.ZEROBOUNCE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          ARGS=(--max-stage "${{ inputs.max_stage || '25' }}" --product "${{ inputs.product || 'rotate' }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python -m outreach.run_hailbytes "${ARGS[@]}"
