name: Image gallery discovery + enhance

# Runs Stages 1 + 2 of the image-gallery pipeline:
#   * discover candidates from Reddit / Commons / NASA
#   * upscale + watermark via ONNX Real-ESRGAN
#
# Output is uploaded as an artifact (gallery.db plus the enhanced JPEGs).
# Triage flow:
#   1. Open the latest workflow run, download `gallery-state-<run-id>`.
#   2. Unzip into outreach/image-gallery/.
#   3. `python review_ui.py` on your laptop.
#   4. Approve items locally — `gallery.db` records the queue.
#   5. Commit the updated `outreach/image-gallery/gallery.db` to the branch
#      and push. The post workflow's cron picks up due rows from there.
#
# The ONNX model (~5 MB realesr-general-x4v3) is committed under
# outreach/image-gallery/models/ and used as-is. Regenerate via
# convert_model.py if the upstream weights ever change.

on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated sources: reddit,commons,nasa,exa'
        required: false
        default: 'reddit,commons,nasa'
      subreddits:
        description: 'Comma-separated subreddits (overrides defaults)'
        required: false
        default: ''
      min_score:
        description: 'Reddit min upvote score'
        required: false
        default: '500'
      enhance_limit:
        description: 'Max candidates to enhance this run'
        required: false
        default: '10'
      verbose:
        description: 'Verbose logging'
        required: false
        type: boolean
        default: true
  schedule:
    # Daily at 13:00 UTC (~6am Pacific, ~9am Eastern). Earlier than the
    # posting window so freshly-enhanced items have time for human review
    # before the first post slot of the day.
    - cron: '0 13 * * *'

permissions:
  contents: write    # we commit gallery.db back

concurrency:
  group: image-gallery-state
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: outreach/image-gallery/requirements.txt

      - name: Install dependencies
        run: pip install -r outreach/image-gallery/requirements.txt

      - name: Run discovery
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          SOURCES: ${{ inputs.sources || 'reddit,commons,nasa' }}
          SUBREDDITS: ${{ inputs.subreddits }}
          MIN_SCORE: ${{ inputs.min_score || '500' }}
          VERBOSE: ${{ inputs.verbose || 'true' }}
        working-directory: outreach/image-gallery
        run: |
          set -euo pipefail
          ARGS=()
          IFS=',' read -ra SRCS <<< "$SOURCES"
          for s in "${SRCS[@]}"; do ARGS+=("--$s"); done
          if [ -n "${SUBREDDITS:-}" ]; then
            IFS=',' read -ra SUBS <<< "$SUBREDDITS"
            for sub in "${SUBS[@]}"; do ARGS+=("--subreddit" "$sub"); done
          fi
          ARGS+=("--min-score" "$MIN_SCORE")
          if [ "${VERBOSE:-true}" = "true" ]; then ARGS+=("--verbose"); fi
          python discover.py "${ARGS[@]}"

      - name: Run enhancement
        env:
          ENHANCE_LIMIT: ${{ inputs.enhance_limit || '10' }}
          VERBOSE: ${{ inputs.verbose || 'true' }}
        working-directory: outreach/image-gallery
        run: |
          set -euo pipefail
          ARGS=("--limit" "$ENHANCE_LIMIT")
          if [ "${VERBOSE:-true}" = "true" ]; then ARGS+=("--verbose"); fi
          python enhance.py "${ARGS[@]}"

      - name: Upload state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gallery-state-${{ github.run_id }}
          path: |
            outreach/image-gallery/gallery.db
            outreach/image-gallery/enhanced/**
            outreach/image-gallery/candidates/**
          if-no-files-found: warn
          retention-days: 14

      - name: Commit gallery.db back
        run: |
          set -euo pipefail
          if git diff --quiet -- outreach/image-gallery/gallery.db; then
            echo "No DB changes to commit."
            exit 0
          fi
          git config user.name  "ultrazoom-bot[ci]"
          git config user.email "bot@lostrabbitdigital.com"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add outreach/image-gallery/gallery.db
          git commit -m "image-gallery: discovery + enhance run ${{ github.run_id }}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
