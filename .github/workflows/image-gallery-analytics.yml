name: Image gallery analytics

# Stage 5 of the image-gallery pipeline.  Polls Imgur for view/upvote counts
# on every post younger than --max-age-days, writes a fresh row per post
# into `analytics`, and dumps a CSV summary as a workflow artifact.
#
# Required GitHub Secrets:
#   IMGUR_CLIENT_ID, IMGUR_CLIENT_SECRET, IMGUR_REFRESH_TOKEN

on:
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Skip posts older than N days'
        required: false
        default: '60'
  schedule:
    # Once a day, 09:30 UTC.
    - cron: '30 9 * * *'

permissions:
  contents: write

concurrency:
  group: image-gallery-state
  cancel-in-progress: false

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: outreach/image-gallery/requirements.txt

      - name: Install dependencies
        run: pip install -r outreach/image-gallery/requirements.txt

      - name: Sanity-check secrets
        env:
          IMGUR_CLIENT_ID:     ${{ secrets.IMGUR_CLIENT_ID }}
          IMGUR_CLIENT_SECRET: ${{ secrets.IMGUR_CLIENT_SECRET }}
          IMGUR_REFRESH_TOKEN: ${{ secrets.IMGUR_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${IMGUR_CLIENT_ID:-}" ]     && missing+=("IMGUR_CLIENT_ID")
          [ -z "${IMGUR_CLIENT_SECRET:-}" ] && missing+=("IMGUR_CLIENT_SECRET")
          [ -z "${IMGUR_REFRESH_TOKEN:-}" ] && missing+=("IMGUR_REFRESH_TOKEN")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Sample stats
        env:
          IMGUR_CLIENT_ID:     ${{ secrets.IMGUR_CLIENT_ID }}
          IMGUR_CLIENT_SECRET: ${{ secrets.IMGUR_CLIENT_SECRET }}
          IMGUR_REFRESH_TOKEN: ${{ secrets.IMGUR_REFRESH_TOKEN }}
          MAX_AGE_DAYS: ${{ inputs.max_age_days || '60' }}
        working-directory: outreach/image-gallery
        run: |
          python analytics.py --max-age-days "$MAX_AGE_DAYS" \
            --csv-out analytics-${{ github.run_id }}.csv --verbose

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gallery-analytics-${{ github.run_id }}
          path: outreach/image-gallery/analytics-${{ github.run_id }}.csv
          if-no-files-found: warn
          retention-days: 90

      - name: Commit gallery.db back
        run: |
          set -euo pipefail
          if git diff --quiet -- outreach/image-gallery/gallery.db; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "ultrazoom-bot[ci]"
          git config user.email "bot@lostrabbitdigital.com"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add outreach/image-gallery/gallery.db
          git commit -m "image-gallery: analytics sample (run ${{ github.run_id }})"
          git push origin HEAD:"${GITHUB_REF_NAME}"
