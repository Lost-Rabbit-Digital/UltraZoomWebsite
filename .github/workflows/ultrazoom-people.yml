name: Ultra Zoom power-user outreach

# Daily LinkedIn power-user cold-email lane for Ultra Zoom. Runs at
# 8:06 AM MDT (14:06 UTC) every morning, six minutes after the
# HailBytes lane so MailMeteor reads from the two tabs don't collide.
#
# Pipeline shape (Wiza-direct):
#   plain-English seed
#     → Claude translates to Wiza filter object (cached 7 days)
#     → Wiza /prospects/search preview (free)
#     → Wiza /prospects/create_prospect_list (charges credits)
#     → poll until finished, fetch enriched contacts
#     → optional Hunter/NeverBounce/ZeroBounce verify fallback
#     → Claude 2-sentence opener
#     → append to "UltraZoom" tab of the source Sheet
#
# Required GitHub Secrets:
#   WIZA_API_KEY                   (prospect search + email enrichment)
#   ANTHROPIC_API_KEY              (filter translation + Claude opener)
#   HUNTER_API_KEY                 (optional — verifier fallback)
#   NEVERBOUNCE_API_KEY            (optional verifier override)
#   ZEROBOUNCE_API_KEY             (optional verifier override)
# Required GitHub Variables:
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_SERVICE_ACCOUNT
#   GOOGLE_SHEET_ID
#
# Sheet expectation: a tab named "UltraZoom" must exist with headers
# matching outreach.config.SHEET_COLUMNS. The recent_post_url column
# stores the LinkedIn profile URL for that prospect.
#
# Wiza API references:
#   https://docs.wiza.co/api-reference/prospect/prospect-search
#   https://docs.wiza.co/api-reference/prospect-lists/create-prospect-list
#   https://docs.wiza.co/api-reference/lists/get-list-contacts

on:
  schedule:
    - cron: '6 14 * * *'  # 8:06 AM MDT daily
  workflow_dispatch:
    inputs:
      max_profiles:
        description: 'Max enriched contacts per seed (each ~2 email credits)'
        required: false
        default: '5'
      limit_seeds:
        description: 'Seeds to run this invocation (rotated daily)'
        required: false
        default: '3'
      enrichment_level:
        description: 'Wiza enrichment level'
        required: false
        type: choice
        options:
          - none
          - partial
          - full
        default: partial
      preview_only:
        description: 'Preview match counts only — do not spend credits'
        required: false
        type: boolean
        default: false
      no_verify:
        description: 'Skip post-Wiza email verifier fallback'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no API calls, no Sheet writes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: ultrazoom-people
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r outreach/requirements.txt

      - name: Sanity-check secrets and variables
        if: ${{ inputs.dry_run != true }}
        env:
          WIZA_API_KEY: ${{ secrets.WIZA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${WIZA_API_KEY:-}" ] && missing+=("WIZA_API_KEY")
          [ -z "${ANTHROPIC_API_KEY:-}" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -z "${GCP_SERVICE_ACCOUNT:-}" ] && missing+=("GCP_SERVICE_ACCOUNT")
          [ -z "${GOOGLE_SHEET_ID:-}" ] && missing+=("GOOGLE_SHEET_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ inputs.dry_run != true }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Run Ultra Zoom power-user pipeline
        env:
          WIZA_API_KEY: ${{ secrets.WIZA_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          NEVERBOUNCE_API_KEY: ${{ secrets.NEVERBOUNCE_API_KEY }}
          ZEROBOUNCE_API_KEY: ${{ secrets.ZEROBOUNCE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          ARGS=(
            --max-profiles "${{ inputs.max_profiles || '5' }}"
            --limit-seeds "${{ inputs.limit_seeds || '3' }}"
            --enrichment-level "${{ inputs.enrichment_level || 'partial' }}"
          )
          if [ "${{ inputs.preview_only }}" = "true" ]; then
            ARGS+=(--preview-only)
          fi
          if [ "${{ inputs.no_verify }}" = "true" ]; then
            ARGS+=(--no-verify)
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python -m outreach.run_uz_people "${ARGS[@]}"
