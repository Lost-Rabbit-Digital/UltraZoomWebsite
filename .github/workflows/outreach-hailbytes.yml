name: HailBytes outreach

# Consolidated HailBytes (SAT + ASM) cold-email pipeline. Wiza-direct:
#
#   plain-English seed (seeds_hb_mssp.txt — MSSP + pen-test focus)
#     → Claude translates to Wiza filter (cached 7d)
#     → Wiza /prospects/search preview (free)
#     → Wiza /prospects/create_prospect_list (charges credits)
#     → poll until finished, fetch valid contacts
#     → optional verifier fallback
#     → Claude opener anchored to SAT or ASM (rotates daily by default)
#     → append to "HailBytes" tab of the source Sheet
#
# No cron — dispatch only. Re-enable a schedule once steady-state quality
# is verified.
#
# Defaults are tuned for scale-up runs:
#   limit_seeds=5  max_profiles=25  ⇒ ~125 contacts/run, ~250 credits.
# Drop both back to small numbers for a smoke test on a new template.
#
# Required GitHub Secrets:
#   WIZA_API_KEY                   (prospect search + email enrichment)
#   ANTHROPIC_API_KEY              (filter translation + opener)
#   HUNTER_API_KEY                 (optional — verifier fallback)
#   NEVERBOUNCE_API_KEY            (optional verifier override)
#   ZEROBOUNCE_API_KEY             (optional verifier override)
# Required GitHub Variables:
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_SERVICE_ACCOUNT
#   GOOGLE_SHEET_ID                (the MailMeteor source sheet)
#
# Sheet expectation: a tab named "HailBytes" with headers matching
# outreach.config.SHEET_COLUMNS. Pipeline appends only — never overwrites
# — and dedupes per-email against existing rows in that tab.

on:
  workflow_dispatch:
    inputs:
      max_profiles:
        description: 'Max enriched contacts per Wiza seed (~2 credits each)'
        required: false
        default: '25'
      limit_seeds:
        description: 'Seeds to run from seeds_hb_mssp.txt'
        required: false
        default: '5'
      enrichment_level:
        description: 'Wiza enrichment level'
        required: false
        type: choice
        options:
          - partial
          - full
          - none
        default: partial
      product:
        description: 'Which HailBytes product the opener anchors'
        required: false
        type: choice
        options:
          - rotate
          - sat
          - asm
        default: rotate
      preview_only:
        description: 'Preview Wiza match counts only — do not spend credits'
        required: false
        type: boolean
        default: false
      no_verify:
        description: 'Skip post-Wiza email verifier fallback'
        required: false
        type: boolean
        default: false
      model:
        description: 'Anthropic model'
        required: false
        type: choice
        options:
          - haiku
          - sonnet
          - opus
        default: haiku
      dry_run:
        description: 'Dry run (no API calls, no Sheet writes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: outreach-hailbytes
  cancel-in-progress: false

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r outreach/requirements.txt

      - name: Sanity-check secrets and variables
        if: ${{ inputs.dry_run != true }}
        env:
          WIZA_API_KEY: ${{ secrets.WIZA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${WIZA_API_KEY:-}" ] && missing+=("WIZA_API_KEY")
          [ -z "${ANTHROPIC_API_KEY:-}" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -z "${GCP_SERVICE_ACCOUNT:-}" ] && missing+=("GCP_SERVICE_ACCOUNT")
          [ -z "${GOOGLE_SHEET_ID:-}" ] && missing+=("GOOGLE_SHEET_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ inputs.dry_run != true }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Run HailBytes outreach
        env:
          WIZA_API_KEY: ${{ secrets.WIZA_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          NEVERBOUNCE_API_KEY: ${{ secrets.NEVERBOUNCE_API_KEY }}
          ZEROBOUNCE_API_KEY: ${{ secrets.ZEROBOUNCE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          ARGS=(
            --max-profiles "${{ inputs.max_profiles || '25' }}"
            --limit-seeds "${{ inputs.limit_seeds || '5' }}"
            --enrichment-level "${{ inputs.enrichment_level || 'partial' }}"
            --product "${{ inputs.product || 'rotate' }}"
            --model "${{ inputs.model || 'haiku' }}"
          )
          if [ "${{ inputs.preview_only }}" = "true" ]; then
            ARGS+=(--preview-only)
          fi
          if [ "${{ inputs.no_verify }}" = "true" ]; then
            ARGS+=(--no-verify)
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python -m outreach.run_hailbytes "${ARGS[@]}"
