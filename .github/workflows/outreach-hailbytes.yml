name: HailBytes outreach

# Consolidated HailBytes (SAT + ASM) cold-email pipeline. Apollo-direct:
#
#   titles list (seeds_hb_titles.txt — decision-maker titles at MSSP /
#     pen-test / offensive-security firms)
#     → single Apollo /mixed_people/api_search filter (titles + email
#       status; no LLM filter translation)
#     → preview (free; logs match count + per-filter strip diagnostic)
#     → Apollo paged search → verified-email contacts
#     → optional verifier fallback (Hunter / NeverBounce / ZeroBounce)
#     → Claude opener anchored to SAT (https://hailbytes.com/sat) or
#       ASM (https://hailbytes.com/asm); rotates daily by default
#     → append to "HailBytes" tab of the source Sheet (MailMeteor reads
#       from there to schedule sends inside Gmail)
#
# No cron — dispatch only. Re-enable a schedule once steady-state quality
# is verified.
#
# Default max_profiles=100 for a single batched search. Drop to a small
# number for a smoke test on a new template.
#
# Required GitHub Secrets:
#   APOLLO_API_KEY                 (people search + email reveal)
#   ANTHROPIC_API_KEY              (filter translation + opener)
#   HUNTER_API_KEY                 (optional — verifier fallback)
#   NEVERBOUNCE_API_KEY            (optional verifier override)
#   ZEROBOUNCE_API_KEY             (optional verifier override)
# Required GitHub Variables:
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#   GCP_SERVICE_ACCOUNT
#   GOOGLE_SHEET_ID                (the MailMeteor source sheet)
#
# Sheet expectation: a tab named "HailBytes" with headers matching
# outreach.config.SHEET_COLUMNS. Pipeline appends only — never overwrites
# — and dedupes per-email against existing rows in that tab.

on:
  workflow_dispatch:
    inputs:
      max_profiles:
        description: 'Max contacts pulled from Apollo for the title batch'
        required: false
        default: '100'
      product:
        description: 'Which HailBytes product the opener anchors'
        required: false
        type: choice
        options:
          - rotate
          - sat
          - asm
        default: rotate
      preview_only:
        description: 'Preview Apollo match counts only — do not page through results'
        required: false
        type: boolean
        default: false
      no_verify:
        description: 'Skip post-Apollo email verifier fallback'
        required: false
        type: boolean
        default: false
      model:
        description: 'Anthropic model'
        required: false
        type: choice
        options:
          - haiku
          - sonnet
          - opus
        default: haiku
      dry_run:
        description: 'Dry run (no API calls, no Sheet writes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: outreach-hailbytes
  cancel-in-progress: false

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r outreach/requirements.txt

      - name: Sanity-check secrets and variables
        if: ${{ inputs.dry_run != true }}
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${APOLLO_API_KEY:-}" ] && missing+=("APOLLO_API_KEY")
          [ -z "${ANTHROPIC_API_KEY:-}" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER")
          [ -z "${GCP_SERVICE_ACCOUNT:-}" ] && missing+=("GCP_SERVICE_ACCOUNT")
          [ -z "${GOOGLE_SHEET_ID:-}" ] && missing+=("GOOGLE_SHEET_ID")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::missing secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ inputs.dry_run != true }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Run HailBytes outreach
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          NEVERBOUNCE_API_KEY: ${{ secrets.NEVERBOUNCE_API_KEY }}
          ZEROBOUNCE_API_KEY: ${{ secrets.ZEROBOUNCE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID }}
        run: |
          set -euo pipefail
          ARGS=(
            --max-profiles "${{ inputs.max_profiles || '100' }}"
            --product "${{ inputs.product || 'rotate' }}"
            --model "${{ inputs.model || 'haiku' }}"
          )
          if [ "${{ inputs.preview_only }}" = "true" ]; then
            ARGS+=(--preview-only)
          fi
          if [ "${{ inputs.no_verify }}" = "true" ]; then
            ARGS+=(--no-verify)
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python -m outreach.run_hailbytes "${ARGS[@]}"
